<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Performance Predictor</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .container{
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            width: 500px;
        }

        h1{
            color: #333;
            font-size: 40px;
            margin-bottom: 20px;
        }

        p{
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn{
            display: inline-block;
            padding: 14px 30px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            font-size: 18px;
            border-radius: 10px;
            transition: 0.3s ease;
        }

        .btn:hover{
            background: #008cff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Student Performance Predictor</h1>

        <p>
            Predict student math scores using Machine Learning.
        </p>

        <a href="/predictdata" class="btn">
            Start Prediction
        </a>
    </div>

</body>
</html>
